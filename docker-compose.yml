version: '3.8'

services:
  # --- DATABASES ---
  mysql:
    image: mysql:8.0
    container_name: etl_mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123"
      MYSQL_DATABASE: etl_database
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - etl_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123"]
      interval: 10s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    container_name: etl_cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: "ETLCluster"
      CASSANDRA_AUTHENTICATOR: "PasswordAuthenticator"
      # Giới hạn dung lượng Heap để tiết kiệm RAM trên Droplet $18
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "100M"
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - etl_network
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q 'UN'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Ghi chú: Cụm spark-master và spark-worker độc lập đã được gỡ bỏ 
  # vì Spark được chạy trực tiếp ở chế độ local bên trong container etl-function-app, 
  # giúp tiết kiệm được hơn 1.5GB RAM trên máy chủ mà không ảnh hưởng tới code.

  # --- VISUALIZATION ---
  grafana:
    image: grafana/grafana:latest
    container_name: etl_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - etl_network
    depends_on:
      mysql:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    environment:
      # Cho phép nhúng Grafana vào thẻ iframe của trang web khác
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Bật tính năng truy cập không danh tính (cho phép xem dashboard không cần đăng nhập)
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"

  # --- AZURE STORAGE EMULATOR (Azurite) ---
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: etl_azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    networks:
      - etl_network

  # --- ETL FUNCTION APP CONTAINER ---
  etl-function-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etl_function_app
    ports:
      - "8082:80"
    depends_on:
      mysql:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      # Kích hoạt chế độ Development để log đầy đủ thông tin ra console
      AZURE_FUNCTIONS_ENVIRONMENT: Development
      # Cho phép truy cập từ mọi origin (CORS) để tránh bị trình duyệt chặn khi chạy giao diện html từ nguồn khác
      CORS_ALLOWED_ORIGINS: '["*"]'
      # Kết nối Function App tới trình giả lập Azurite local
      AzureWebJobsStorage: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      
      # Các cấu hình kết nối database trỏ thẳng tới tên các container trong mạng docker
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_USER: cassandra
      CASSANDRA_PASSWORD: cassandra
      CASSANDRA_KEYSPACE: recruitment
      CASSANDRA_TABLE: tracking
      
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: 123
      MYSQL_DATABASE: etl_database
      MYSQL_TARGET_TABLE: events
    networks:
      - etl_network

networks:
  etl_network:
    driver: bridge

volumes:
  mysql_data:
  cassandra_data:
  grafana_data:
