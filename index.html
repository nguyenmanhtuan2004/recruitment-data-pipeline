<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment ETL Ingestion Dashboard</title>
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16 0%, #111827 50%, #1e1b4b 100%);
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent-purple: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* Ambient glowing circles */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15) 0%, rgba(0, 242, 254, 0) 70%);
            top: 10%;
            left: 10%;
            z-index: -1;
            filter: blur(40px);
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(139, 92, 246, 0) 70%);
            bottom: 10%;
            right: 10%;
            z-index: -1;
            filter: blur(50px);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Header design */
        header {
            width: 100%;
            max-width: 1100px;
            text-align: center;
            margin-bottom: 1rem;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        /* Cards and Glassmorphism */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0.8;
        }

        .glass-card.console-card::before {
            background: linear-gradient(90deg, var(--secondary), var(--accent-purple));
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-main);
        }

        .card-title svg {
            width: 22px;
            height: 22px;
            fill: var(--primary);
        }

        /* Form styling */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        select option {
            background: #111827;
            color: var(--text-main);
        }

        /* Ingest Button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            border-radius: 8px;
            padding: 0.9rem 1.5rem;
            color: #0b0f19;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
            position: relative;
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
            background: linear-gradient(90deg, #05e6f2 0%, #3ca6fe 100%);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Spinner for loading */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--text-main);
            animation: spin 0.8s linear infinite;
            display: none;
        }

        /* Console / Logs Panel */
        .console-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 0.35rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            box-shadow: 0 0 8px var(--text-muted);
        }

        .status-badge.idle .status-dot {
            background: var(--text-muted);
            box-shadow: 0 0 8px var(--text-muted);
        }

        .status-badge.running .status-dot {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
            animation: pulse 1s infinite alternate;
        }

        .status-badge.success .status-dot {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-badge.error .status-dot {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .console-window {
            flex-grow: 1;
            background: #040711;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #10b981; /* Default retro green color */
            min-height: 320px;
            max-height: 480px;
            overflow-y: auto;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .console-placeholder {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            font-style: italic;
        }

        .console-log-entry {
            margin-bottom: 0.5rem;
            animation: fadeIn 0.3s ease;
        }

        .console-log-entry.timestamp {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .console-log-entry.error {
            color: var(--danger);
        }

        .console-log-entry.info {
            color: var(--secondary);
        }

        .console-log-entry.json {
            color: #c9d1d9;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.5rem;
            border-radius: 4px;
            white-space: pre-wrap;
            margin-top: 0.25rem;
            border-left: 2px solid var(--accent-purple);
        }

        .console-clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .console-clear-btn:hover {
            color: var(--text-main);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            background: rgba(17, 24, 39, 0.9);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            color: var(--text-main);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 300px;
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        /* Animations */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            to { opacity: 0.4; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <header>
        <h1>RECRUITMENT PIPELINE CONTROLLER</h1>
        <p>Mock Event Ingestion & Automated Spark ETL Trigger</p>
    </header>

    <main class="container">
        <!-- Event Ingestion Form -->
        <section class="glass-card">
            <div class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Send Tracking Event
            </div>
            
            <form id="ingestionForm">
                <div class="form-group">
                    <label for="custom_track">Event Action (custom_track)</label>
                    <select id="custom_track" name="custom_track" required>
                        <option value="click">Click (Quảng cáo / Tin tuyển dụng)</option>
                        <option value="conversion">Conversion (Ứng tuyển hồ sơ)</option>
                        <option value="qualified">Qualified (Ứng tuyển đạt chuẩn)</option>
                        <option value="unqualified">Unqualified (Ứng tuyển không đạt)</option>
                    </select>
                </div>

                <div class="form-group-row">
                    <div>
                        <label for="job_id">Job ID</label>
                        <select id="job_id" name="job_id" required>
                            <option value="1">Job 1 (Python Dev)</option>
                            <option value="2">Job 2 (Java Dev)</option>
                            <option value="3">Job 3 (Data Engineer)</option>
                            <option value="4">Job 4 (UI/UX Designer)</option>
                            <option value="5">Job 5 (Product Manager)</option>
                        </select>
                    </div>
                    <div>
                        <label for="publisher_id">Publisher ID</label>
                        <select id="publisher_id" name="publisher_id" required>
                            <option value="1">Publisher 1 (Facebook Ads)</option>
                            <option value="2">Publisher 2 (Google Jobs)</option>
                            <option value="3">Publisher 3 (LinkedIn)</option>
                            <option value="4">Publisher 4 (TopCV)</option>
                            <option value="5">Publisher 5 (VietNamWorks)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group-row">
                    <div>
                        <label for="campaign_id">Campaign ID</label>
                        <select id="campaign_id" name="campaign_id" required>
                            <option value="10">Campaign 10 (Tech Recruit 2026)</option>
                            <option value="11">Campaign 11 (Summer Internship)</option>
                            <option value="12">Campaign 12 (Direct Publisher Direct)</option>
                        </select>
                    </div>
                    <div>
                        <label for="group_id">Group ID</label>
                        <select id="group_id" name="group_id">
                            <option value="20">Group 20 (Software Team)</option>
                            <option value="21">Group 21 (Data Team)</option>
                            <option value="22">Group 22 (Design Team)</option>
                            <option value="">None (NULL)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" id="bidGroup">
                    <label for="bid">Advertising Bid (USD)</label>
                    <input type="number" id="bid" name="bid" value="1.50" min="0.00" max="100.00" step="0.01">
                </div>

                <button type="submit" id="btnSubmit" class="btn-submit">
                    <span class="spinner" id="spinner"></span>
                    <span id="btnText">Send Event & Trigger ETL</span>
                </button>
            </form>
        </section>

        <!-- Response & System Logs Panel -->
        <section class="glass-card console-card">
            <div class="console-container">
                <div class="console-header">
                    <div class="card-title" style="margin-bottom: 0;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 12H4v-2h8v2zm8-4H4V8h16v4z"/></svg>
                        API Response Logs
                    </div>
                    <div class="status-container" style="display: flex; align-items: center; gap: 1rem;">
                        <button class="console-clear-btn" id="btnClearConsole">Clear Logs</button>
                        <div class="status-badge idle" id="statusBadge">
                            <span class="status-dot"></span>
                            <span id="statusText">IDLE</span>
                        </div>
                    </div>
                </div>
                
                <div class="console-window" id="consoleWindow">
                    <div class="console-placeholder" id="consolePlaceholder">
                        No logs recorded yet. Send an event to trigger the pipeline and view logs.
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const ingestionForm = document.getElementById('ingestionForm');
        const customTrackSelect = document.getElementById('custom_track');
        const bidGroup = document.getElementById('bidGroup');
        const btnSubmit = document.getElementById('btnSubmit');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const consoleWindow = document.getElementById('consoleWindow');
        const consolePlaceholder = document.getElementById('consolePlaceholder');
        const btnClearConsole = document.getElementById('btnClearConsole');
        const toastContainer = document.getElementById('toastContainer');

        // Toggle Bid visibility based on event type
        customTrackSelect.addEventListener('change', function() {
            if (this.value === 'click') {
                bidGroup.style.display = 'block';
            } else {
                bidGroup.style.display = 'none';
            }
        });

        // Clear console logs
        btnClearConsole.addEventListener('click', function() {
            consoleWindow.innerHTML = '';
            consoleWindow.appendChild(consolePlaceholder);
            consolePlaceholder.style.display = 'flex';
        });

        // Add log entry to console window
        function log(message, type = 'normal') {
            consolePlaceholder.style.display = 'none';
            
            const timestamp = new Date().toLocaleTimeString();
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'console-log-entry timestamp';
            timeDiv.innerText = `[${timestamp}]`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = `console-log-entry ${type}`;
            
            if (type === 'json') {
                contentDiv.innerText = JSON.stringify(message, null, 2);
            } else {
                contentDiv.innerText = message;
            }
            
            consoleWindow.appendChild(timeDiv);
            consoleWindow.appendChild(contentDiv);
            consoleWindow.scrollTop = consoleWindow.scrollHeight;
        }

        // Show Toast Notifications
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';
            if (type === 'success') {
                icon = '<svg width="18" height="18" fill="#10b981" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
            } else if (type === 'error') {
                icon = '<svg width="18" height="18" fill="#ef4444" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
            }
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Form Submit Handler
        ingestionForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Set UI to loading state
            btnSubmit.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.innerText = 'Processing Ingestion & ETL...';
            
            statusBadge.className = 'status-badge running';
            statusText.innerText = 'PROCESSING';

            // Construct payload
            const formData = new FormData(ingestionForm);
            const payload = {
                custom_track: formData.get('custom_track'),
                job_id: parseInt(formData.get('job_id')),
                publisher_id: parseInt(formData.get('publisher_id')),
                campaign_id: parseInt(formData.get('campaign_id')),
                group_id: formData.get('group_id') ? parseInt(formData.get('group_id')) : null,
                bid: formData.get('custom_track') === 'click' ? parseFloat(formData.get('bid') || 0) : 0
            };

            log(`Sending Event Ingestion request to POST /api/track...`, 'info');
            log(payload, 'json');

            try {
                // Call local Ingestion & ETL trigger API
                const response = await fetch('/api/track', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    statusBadge.className = 'status-badge success';
                    statusText.innerText = 'SUCCESS';
                    log(`API Success (HTTP ${response.status}): Event stored and ETL pipeline completed!`, 'info');
                    log(result, 'json');
                    showToast('Event ingested and ETL run complete!', 'success');
                } else {
                    statusBadge.className = 'status-badge error';
                    statusText.innerText = 'ERROR';
                    log(`API Failed (HTTP ${response.status}): ${result.message || result.error || 'Unknown error'}`, 'error');
                    if (result.error) log(result.error, 'error');
                    showToast('Event stored but ETL failed or returned an error.', 'error');
                }
            } catch (error) {
                statusBadge.className = 'status-badge error';
                statusText.innerText = 'ERROR';
                log(`Network error: ${error.message}`, 'error');
                showToast('Failed to connect to API server.', 'error');
            } finally {
                // Restore button state
                btnSubmit.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'Send Event & Trigger ETL';
            }
        });
    </script>
</body>
</html>
